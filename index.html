<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mine Hills Pool Villa | ตารางบ้านว่าง</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">Mine Hills Pool Villa</p>
      <h1>ตารางบ้านว่าง / ไม่ว่าง</h1>
      <p class="sub">ลูกค้าสามารถเลือกบ้านและดูวันว่างได้เอง</p>
    </div>
    <button id="adminBtn" class="admin-btn">แอดมิน</button>
  </header>

  <main class="wrap">
    <section id="customerPanel" class="card">
      <div class="toolbar">
        <div>
          <h2>เลือกบ้านพัก</h2>
          <p>สีเขียว = ว่าง | สีแดง = จองแล้ว | สีเทา = ปิด/ล็อก</p>
        </div>
        <div class="month-control">
          <button id="prevMonth">‹</button>
          <strong id="monthLabel"></strong>
          <button id="nextMonth">›</button>
        </div>
      </div>
      <div id="roomList" class="room-list"></div>
      <div class="calendar-head">
        <h3 id="activeRoomName"></h3>
        <div class="legend">
          <span><i class="dot free"></i>ว่าง</span>
          <span><i class="dot booked"></i>จองแล้ว</span>
          <span><i class="dot locked"></i>ปิด/ล็อก</span>
        </div>
      </div>
      <div id="calendar" class="calendar"></div>
    </section>

    <section id="adminPanel" class="card admin-panel hidden">
      <div class="toolbar">
        <div>
          <h2>จัดการวันว่าง</h2>
          <p>เลือกสถานะ แล้วคลิกวันที่ต้องการ ข้อมูลจะบันทึกลง Firebase อัตโนมัติ</p>
        </div>
        <button id="backCustomer" class="ghost-btn">กลับหน้าลูกค้า</button>
      </div>
      <div class="admin-tools">
        <button class="mode active" data-mode="free">✅ ว่าง</button>
        <button class="mode" data-mode="booked">🔴 จองแล้ว</button>
        <button class="mode" data-mode="locked">🔒 ปิด/ล็อก</button>
        <button id="clearMonth" class="mode danger">ปลดล็อกทั้งเดือน</button>
      </div>
      <div class="admin-note" id="saveStatus">พร้อมใช้งาน</div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
